# Prometheus Configuration for Aether AI
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aether-production'
    replica: '1'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Aether AI API
  - job_name: 'aether-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['aether-api:8000']
        labels:
          service: 'api'
          environment: 'production'

  # PostgreSQL
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres:9187']
        labels:
          service: 'database'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
        labels:
          service: 'cache'

  # Qdrant Vector DB
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: 'vector-db'

  # Node Exporter (System Metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Jaeger (Tracing)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          service: 'tracing'
